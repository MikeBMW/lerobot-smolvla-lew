# =====================================================
# SmolVLA-LEW 最小训练配置
# 用法: PYTHONPATH=src .venv/bin/python -m lerobot.scripts.lerobot_train
# =====================================================
dataset_repo_id: lerobot/pusht
policy:
  type: smolvla_lew
  smolvlm_name: HuggingFaceTB/SmolVLM2-500M-Video-Instruct
  freeze_smolvlm: true
  action_model_type: DiT-B
  action_hidden_size: 256
  action_num_layers: 1
  num_inference_timesteps: 2
  chunk_size: 7
  n_action_steps: 7
  n_obs_steps: 1
  siglip_image_size: 64
  num_vision_tokens: 64

training:
  output_dir: outputs/train/smolvla_lew_pusht
  num_epochs: 5
  batch_size: 1
  learning_rate: 1e-4
  offline: true
  device: mps
